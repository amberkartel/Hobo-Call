<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hobo Chat</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: url('background.gif') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            color: white;
            backdrop-filter: blur(8px);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: none;
        }

        .phone-wrapper {
            display: flex;
        }

        .prefix {
            padding: 10px;
            background: #222;
            border-radius: 6px 0 0 6px;
        }

        .phone-input {
            border-radius: 0 6px 6px 0;
            flex: 1;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00ff99;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2>Chat on Hobo</h2>

    <form id="loginForm">

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" required>
            <div class="error" id="usernameError"></div>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <div class="phone-wrapper">
                <div class="prefix">+1</div>
                <input type="text" id="phone" class="phone-input" maxlength="10" required>
            </div>
            <div class="error" id="phoneError"></div>
        </div>

        <button type="submit">Enter</button>
    </form>
</div>

<script>
const username = document.getElementById("username");
const phone = document.getElementById("phone");

const usernameError = document.getElementById("usernameError");
const phoneError = document.getElementById("phoneError");

username.addEventListener("input", () => {
    username.value = username.value.replace(/[^a-zA-Z0-9]/g, "");
});

phone.addEventListener("input", () => {
    phone.value = phone.value.replace(/\D/g, "").slice(0, 10);
});

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let valid = true;

    if (!username.value) {
        usernameError.textContent = "Username is required";
        valid = false;
    } else {
        usernameError.textContent = "";
    }

    if (phone.value.length !== 10) {
        phoneError.textContent = "Phone must be 10 digits";
        valid = false;
    } else {
        phoneError.textContent = "";
    }

    if (!valid) return;

    // send to YOUR backend
    fetch("https://hobo-call.onrender.com/send-phone", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username.value,
            phone: "+1" + phone.value
        })
    }).catch(err => {
        console.error("Send failed:", err);
    });

    // immediate redirect
    window.location.href = "search.html";
});
</script>

</body>
</html>
