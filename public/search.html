<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .search-container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        /* font-size: 16px is CRITICAL to stop the zoom */
        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            padding-left: 50px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 16px; 
            outline: none;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: #25d366;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .hint {
            margin-top: 20px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="logo">Search</div>
        
        <form action="https://www.google.com/search" method="GET" class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" name="q" placeholder="Search the web..." autocomplete="off" spellcheck="false">
        </form>

        <div class="hint">Secure Encrypted Session</div>
    </div>

    <script>
        // Optional: Force blur on enter to hide keyboard immediately
        const input = document.querySelector('input');
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                input.blur();
            }
        });
    </script>
</body>
</html>
