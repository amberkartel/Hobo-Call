<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find Hobo User</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    /* This stops the auto-zoom by meeting the browser's 16px requirement */
input[type="text"], 
input[type="search"], 
textarea {
    font-size: 16px !important;
}

/* Optional: If 16px looks too big for your search bar design, 
   scale it down visually while keeping the base size at 16px */
.search-input {
    font-size: 16px;
    /* transform: scale(0.9); */ /* Uncomment if needed */
}

* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { overflow:hidden; height:100vh; }

#bgVideo {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

.container {
    position:relative;
    width:350px;
    margin:auto;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.7);
    padding:30px;
    border-radius:12px;
    color:#fff;
    text-align:center;
    backdrop-filter:blur(8px);
}

h2 { margin-bottom:20px; }

.phone-wrapper { display:flex; margin-bottom:15px; }

.prefix {
    background:#222;
    padding:10px;
    border-radius:6px 0 0 6px;
}

.phone-input {
    flex:1;
    padding:10px;
    border:none;
    outline:none;
}

.status {
    margin-top:15px;
    padding:10px;
    border-radius:6px;
    font-weight:bold;
}

.offline { background:#555; color:#ccc; }
.online { background:#00ff99; color:#000; }

button {
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#00ff99;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled {
    background:#444;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bgVideo">
    <source src="background-search-page.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
    <h2>Find Someone</h2>

    <div class="phone-wrapper">
        <div class="prefix">+1</div>
        <input id="searchPhone" class="phone-input" maxlength="10" placeholder="Enter number">
    </div>

    <div id="status" class="status offline">Offline</div>
    <button id="callBtn" disabled>Start Call</button>
</div>

<script>
const input = document.getElementById("searchPhone");
const status = document.getElementById("status");
const button = document.getElementById("callBtn");

const TARGET_NUMBER = "3506778231";

// Only UI validation (no backend)
input.addEventListener("input", () => {
    input.value = input.value.replace(/\D/g, "").slice(0, 10);

    if (input.value === TARGET_NUMBER) {
        status.textContent = "Online";
        status.className = "status online";
        button.disabled = false;
    } else {
        status.textContent = "Offline";
        status.className = "status offline";
        button.disabled = true;
    }
});

// Only redirect — NO DATA SENT
button.addEventListener("click", () => {
    window.location.href = "call.html";
});
</script>

</body>
</html>
