<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Find Hobo User</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            overflow: hidden;
            height: 100vh;
        }

        /* Background video */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Dark overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            width: 350px;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 12px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        h2 {
            margin-bottom: 20px;
        }

        /* Phone input */
        .phone-wrapper {
            display: flex;
            margin-bottom: 15px;
        }

        .prefix {
            background: #222;
            padding: 10px;
            border-radius: 6px 0 0 6px;
            border-right: 1px solid #444;
            display: flex;
            align-items: center;
        }

        .phone-input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
            border-radius: 0 6px 6px 0;
            /* UPDATED: 16px is required to stop iOS/Android auto-zoom */
            font-size: 16px; 
            background: #fff;
            color: #000;
        }

        /* Status */
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
        }

        .offline {
            background: #555;
            color: #ccc;
        }

        .online {
            background: #00ff99;
            color: #000;
        }

        /* Button */
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #00ff99;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00cc77;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<video autoplay muted loop playsinline id="bgVideo">
    <source src="background-search-page.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
    <h2>Find Someone</h2>

    <div class="phone-wrapper">
        <div class="prefix">+1</div>
        <input 
            type="text" 
            id="searchPhone" 
            class="phone-input"
            maxlength="10" 
            placeholder="Enter 10-digit number"
            inputmode="numeric"
        >
    </div>

    <div id="status" class="status offline">Offline</div>

    <button id="callBtn" disabled>Start Call</button>
</div>

<script>
    const input = document.getElementById("searchPhone");
    const status = document.getElementById("status");
    const button = document.getElementById("callBtn");

    const TARGET_NUMBER = "3506778231";

    input.addEventListener("input", () => {
        // Allow only numbers, max 10 digits
        input.value = input.value.replace(/\D/g, "").slice(0, 10);

        if (input.value === TARGET_NUMBER) {
            status.textContent = "Online";
            status.classList.remove("offline");
            status.classList.add("online");
            button.disabled = false;
        } else {
            status.textContent = "Offline";
            status.classList.remove("online");
            status.classList.add("offline");
            button.disabled = true;
        }
    });

    button.addEventListener("click", () => {
        window.location.href = "call.html";
    });
</script>

</body>
</html>
