<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobo Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

        /* Prevents zoom on focus for mobile inputs */
input, select, textarea {
    font-size: 16px !important;
}

/* If 16px makes the text look too big for your design, 
   you can use a transform to scale it back down visually */
.your-input-class {
    font-size: 16px;
}


        .logo {
    width: 80px;      /* Adjust the width to your liking */
    height: auto;     /* Keeps the image from stretching */
    margin-bottom: 10px; 
    display: block;   /* Allows margin: auto to work */
    margin-left: auto;
    margin-right: auto;
}
        body { 
            height: 100vh; 
            background: url('background.gif') no-repeat center center fixed; 
            background-size: cover; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
        }

        .login-container { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 30px; 
            border-radius: 12px; 
            width: 320px; 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; /* Centers the heading and footer text */
        }

        h2 { margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 14px; }
        
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: none; }
        
        .phone-wrapper { display: flex; }
        .prefix { padding: 10px; background: #222; border-radius: 6px 0 0 6px; color: white; }
        .phone-input { border-radius: 0 6px 6px 0; flex: 1; }
        
        button { width: 100%; padding: 12px; background: #00ff99; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: #111; margin-top: 10px; }
        
        .error { color: #ff4444; font-size: 12px; margin-top: 5px; }
        
        .copyright { 
            margin-top: 25px; 
            font-size: 10px; 
            color: white; 
            opacity: 0.7; 
            line-height: 1.4;
        }

        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <audio id="initSound" src="startup.mp3" preload="auto"></audio>


<div class="login-container">
    <img src="logo.png" alt="Hobo Chat Logo" class="logo">
    <h2>Chat on Hobo</h2>
    <form id="loginForm">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" required>
            <div class="error" id="usernameError"></div>
        </div>
        <div class="input-group">
            <label>Phone Number</label>
            <div class="phone-wrapper">
                <div class="prefix">+1</div>
                <input type="text" id="phone" class="phone-input" maxlength="10" required>
            </div>
            <div class="error" id="phoneError"></div>
        </div>
        <button type="submit" id="submitBtn">Enter</button>
    </form>

    <div class="copyright">
        &copy; 2026 Hobo Chat. All rights reserved.<br>
        Designed by Wominga California LLC
    </div>
</div>

<script>
const sound = document.getElementById("initSound");

// 1. Try to play as soon as the page is fully loaded
window.addEventListener('load', () => {
    sound.play().catch(() => {
        console.log("Autoplay blocked. Sound will play on first click.");
    });
});

// 2. Backup: Play on the first click if the browser blocked the 'load' attempt
document.addEventListener('click', () => {
    if (sound.paused) {
        sound.play();
    }
}, { once: true }); // 'once: true' makes sure this only runs for the very first click
    
const btn = document.getElementById("submitBtn");
const username = document.getElementById("username");
const phone = document.getElementById("phone");

phone.addEventListener("input", () => {
    phone.value = phone.value.replace(/\D/g, "").slice(0, 10);
});

document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    
    if (phone.value.length !== 10) {
        document.getElementById("phoneError").textContent = "Enter 10 digits";
        return;
    }

    btn.disabled = true;
    btn.innerHTML = `<div class="spinner"></div>`;

    try {
        await fetch("https://hobo-call.onrender.com/send-phone", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: username.value,
                phone: "+1" + phone.value
            })
        });
        window.location.href = "search.html";
    } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.innerHTML = "Enter";
    }
});
</script>
</body>
</html>
